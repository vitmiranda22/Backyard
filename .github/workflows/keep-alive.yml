name: Keep backend warm

# Render's free tier spins the service down after ~15 minutes of
# inactivity, causing a slow (sometimes 502-on-first-try) cold start for
# whoever hits it next. Pinging the health endpoint on a schedule keeps
# it warm. Free (GitHub Actions' scheduled-workflow minutes don't count
# against private-repo minute limits the same way — and this job takes
# seconds), but not 100% bulletproof: GitHub can delay scheduled runs by
# a few minutes under load, and if the gap exceeds ~15 minutes the
# service still spins down once. A paid Render plan is the only fully
# reliable fix.

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping /health
        run: curl -sf --max-time 30 https://backyard-api.onrender.com/health
