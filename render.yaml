services:
  - type: web
    name: backyard-api
    runtime: docker
    dockerfilePath: backend/Dockerfile
    dockerContext: backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_TTS_API_KEY
        sync: false
      - key: GOOGLE_STREETVIEW_API_KEY
        sync: false
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET_NAME
        sync: false
      - key: TMDB_API_KEY
        sync: false
      - key: GEONAMES_USERNAME
        sync: false
      - key: EUROPEANA_API_KEY
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: DAILY_NARRATION_LIMIT
        value: "250"
      - key: MINUTE_NARRATION_LIMIT
        value: "15"
      - key: ENVIRONMENT
        value: production
